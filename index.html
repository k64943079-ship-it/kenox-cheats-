<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KENOX X CHEATS!</title>

<style>
body{
    margin:0;
    background:#050505;
    font-family:Consolas, monospace;
    color:#fff;
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#00ffcc,#ff00ff,#00ccff,#ffcc00);
    animation:bgMove 10s linear infinite;
    opacity:0.08;
}
@keyframes bgMove{
    0%{transform:translate(-25%,-25%)}
    100%{transform:translate(25%,25%)}
}

/* Title */
#title{
    text-align:center;
    font-size:40px;
    margin-top:20px;
    font-weight:bold;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #00ffcc,0 0 20px #00ffcc;}
    to{text-shadow:0 0 20px #ff00ff,0 0 40px #ff00ff;}
}

/* Textarea */
textarea{
    width:90%;
    height:220px;
    margin:20px auto;
    display:block;
    background:#0f0f0f;
    border:1px solid #333;
    color:#00ffcc;
    padding:10px;
    outline:none;
    box-shadow:0 0 10px #00ffcc33;
}

/* Button */
button{
    display:block;
    margin:10px auto;
    padding:12px 25px;
    border:none;
    background:linear-gradient(90deg,#00ffcc,#ff00ff);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00ffcc;
}

/* File + Drop */
#fileInput{
    display:block;
    margin:10px auto;
}

#dropZone{
    width:90%;
    margin:15px auto;
    padding:20px;
    border:2px dashed #00ffcc;
    text-align:center;
    color:#aaa;
}

/* Output */
pre{
    width:90%;
    margin:20px auto;
    padding:15px;
    background:#0f0f0f;
    color:#00ffcc;
    border-left:3px solid #00ffcc;
    box-shadow:0 0 10px #00ffcc33;
    height:200px;
    overflow:auto;
}
</style>
</head>

<body>

<div id="title">KENOX X CHEATS!</div>

<textarea id="dumpInput" placeholder="Paste dump.cs here..."></textarea>

<button onclick="parseDump()">SCAN BONES</button>

<input type="file" id="fileInput" accept=".cs,.txt">

<div id="dropZone">DRAG & DROP dump.cs / .txt HERE</div>

<pre id="output"></pre>

<script>

/* Animated Title */
const titles = [
    "KENOX X CHEATS!",
    "ULTRA MEMORY SCANNER",
    "BONE OFFSET FINDER",
    "POWERED BY KENOX"
];

let i = 0;
setInterval(()=>{
    i = (i + 1) % titles.length;
    document.getElementById("title").innerText = titles[i];
},7000);

/* Bone Map */
const boneMap = {
    "OLCJOGDHJJJ": "Head",
    "OLJBCONDGLO": "Hip",
    "HCLMADAFLPD": "Chest",
    "MPJBGDJJJMJ": "Root",
    "BMGCHFGEDDA": "LeftAnkle",
    "AGHJLIMNPJA": "RightAnkle",
    "FDMBKCKMODA": "LeftToe",
    "CKABHDJDMAP": "RightToe",
    "LIBEIIIAGIK": "LeftShoulder",
    "HDEPJIBNIIK": "RightShoulder",
    "NJDDAPKPILB": "RightHand",
    "JHIBMHEMJOL": "LeftHand",
    "JBACCHNMGNJ": "RightForearm",
    "FGECMMJKFNC": "LeftForearm"
};

/* File Input */
document.getElementById("fileInput").addEventListener("change", e => {
    handleFile(e.target.files[0]);
});

/* Drag & Drop */
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.style.borderColor = "#ff00ff";
});

dropZone.addEventListener("dragleave", () => {
    dropZone.style.borderColor = "#00ffcc";
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.style.borderColor = "#00ffcc";
    handleFile(e.dataTransfer.files[0]);
});

/* File Reader */
function handleFile(file)
{
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function() {
        parseDumpFast(reader.result);
    };

    reader.readAsText(file);
}

/* Fast Parser */
function parseDumpFast(text)
{
    let result = {};
    let lines = text.split("\n");

    for (let line of lines)
    {
        for (let key in boneMap)
        {
            if (line.includes(key))
            {
                let match = line.match(/0x([0-9A-Fa-f]+)/);
                if (match && !result[key])
                    result[key] = match[1];
            }
        }
    }

    let output = "";

    for (let key in boneMap)
    {
        if (result[key])
            output += `${boneMap[key]} = 0x${result[key]}\n`;
        else
            output += `${boneMap[key]} = NOT FOUND\n`;
    }

    document.getElementById("output").textContent = output;
}

/* Button (manual paste) */
function parseDump()
{
    parseDumpFast(document.getElementById("dumpInput").value);
}

</script>

</body>
</html>
